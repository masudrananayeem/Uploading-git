<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .second-section {
            background-color: lightblue;
            height: 300px;
        }
        #first {
            background-color: red;
            height: 100px;
            width: 100px;
        }
        #second {
            background-color: green;
            height: 100px;
            width: 100px;
            position: relative;
            top: -100px;

        }
        #third {
            background-color: blue;
            height: 100px;
            width: 100px;
        }

    </style>
</head>
<body>
    <section>
        <h1>Heading 1</h1>
        <p>This is a paragraph under heading 1.</p>
    </section>

    <section class="second-section">
       <div id="first"></div>
         <div id="second"></div>
            <div id="third"></div>
    </section>
</body>
</html>
